<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="OtherSide finds your antipode from your current location with a cinematic Earth scroll experience."
    />
    <title>otherside</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="experience" id="experience" aria-live="polite">
      <section class="scene" id="scene" aria-label="OtherSide location flyover">
        <canvas id="earthCanvas" aria-hidden="true"></canvas>
        <div class="earth-fallback" id="earthFallback" aria-hidden="true"></div>
        <div class="shade"></div>
        <div class="mission-panel" aria-hidden="true">
          <span id="phaseLabel">origin</span>
          <div class="phase-track">
            <i id="phaseProgress"></i>
          </div>
          <span id="altitudeLabel">low orbit</span>
        </div>
        <h1>otherside</h1>
        <button class="location-pin" id="locationPin" type="button" aria-label="Go to the other side">
          <span id="pinLabel">your location</span>
        </button>
        <p class="location-readout" id="locationReadout">Locating...</p>
      </section>
    </main>

    <noscript>
      <div class="noscript">OtherSide needs JavaScript to request location and animate Earth.</div>
    </noscript>

    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
